<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Shopping System</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --panel: #111118;
    --border: #1e1e2e;
    --border-bright: #2e2e4e;
    --accent: #00e5a0;
    --accent2: #ff6b35;
    --accent3: #7b61ff;
    --text: #e8e8f0;
    --muted: #6b6b88;
    --danger: #ff4466;
    --gold: #ffd060;
    --card-bg: #14141f;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,229,160,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,160,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 24px 80px;
    position: relative;
    z-index: 1;
  }

  header {
    padding: 40px 0 32px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 40px;
    display: flex;
    align-items: flex-end;
    gap: 24px;
  }

  .header-logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 64px;
    line-height: 0.9;
    letter-spacing: 2px;
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent3) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .header-tag {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    background: rgba(0,229,160,0.08);
    border: 1px solid rgba(0,229,160,0.2);
    padding: 4px 10px;
    border-radius: 2px;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .header-sub {
    font-size: 13px;
    color: var(--muted);
    font-weight: 300;
    margin-bottom: 8px;
    font-family: 'DM Mono', monospace;
  }

  .main-grid {
    display: grid;
    grid-template-columns: 360px 1fr;
    gap: 24px;
    align-items: start;
  }

  @media (max-width: 800px) {
    .main-grid { grid-template-columns: 1fr; }
    .header-logo { font-size: 48px; }
  }

  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }

  .panel-header {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
    background: rgba(255,255,255,0.02);
  }

  .panel-header .dot {
    width: 8px; height: 8px; border-radius: 50%;
  }

  .panel-title {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
  }

  .panel-body { padding: 20px; }

  .budget-display {
    background: var(--card-bg);
    border: 1px solid var(--border-bright);
    border-radius: 6px;
    padding: 20px;
    margin-bottom: 20px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  .budget-display::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent), var(--accent3));
  }

  .budget-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .budget-value {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 52px;
    color: var(--accent);
    letter-spacing: 2px;
    line-height: 1;
  }

  .budget-slider-wrap {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-top: 16px;
  }

  input[type="range"] {
    flex: 1;
    -webkit-appearance: none;
    height: 4px;
    background: var(--border-bright);
    border-radius: 2px;
    outline: none;
  }

  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 18px; height: 18px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
    box-shadow: 0 0 12px rgba(0,229,160,0.5);
    transition: box-shadow 0.2s;
  }

  .slider-label {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    min-width: 28px;
  }

  .form-row {
    display: grid;
    grid-template-columns: 1fr 80px 70px;
    gap: 8px;
    margin-bottom: 8px;
    align-items: end;
  }

  .field-group label {
    display: block;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  input[type="text"], input[type="number"], select {
    width: 100%;
    background: var(--card-bg);
    border: 1px solid var(--border-bright);
    border-radius: 4px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    padding: 9px 12px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  input:focus, select:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 2px rgba(0,229,160,0.1);
  }

  .priority-wrap {
    display: flex;
    gap: 4px;
  }

  .priority-btn {
    flex: 1;
    padding: 8px 0;
    background: var(--card-bg);
    border: 1px solid var(--border-bright);
    border-radius: 3px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
  }

  .priority-btn:hover { border-color: var(--accent); color: var(--accent); }
  .priority-btn.active { background: var(--accent); border-color: var(--accent); color: #000; font-weight: 500; }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 18px;
    border-radius: 4px;
    border: none;
    cursor: pointer;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    letter-spacing: 1px;
    text-transform: uppercase;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .btn-add {
    background: rgba(0,229,160,0.1);
    border: 1px solid rgba(0,229,160,0.3);
    color: var(--accent);
    width: 100%;
    justify-content: center;
    margin-top: 12px;
  }

  .btn-solve {
    background: linear-gradient(135deg, var(--accent), #00c87a);
    color: #000;
    font-weight: 700;
    width: 100%;
    justify-content: center;
    padding: 14px;
    font-size: 13px;
    margin-top: 16px;
    box-shadow: 0 4px 20px rgba(0,229,160,0.3);
  }

  .btn-csv {
    background: rgba(123,97,255,0.1);
    border: 1px solid rgba(123,97,255,0.3);
    color: var(--accent3);
    width: 100%;
    justify-content: center;
    margin-top: 8px;
  }

  .wishlist-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }

  .wishlist-table th {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    text-align: left;
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
  }

  .wishlist-table td {
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
    vertical-align: middle;
  }

  .cat-badge {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 2px 6px;
    border-radius: 2px;
    margin-left: 6px;
  }

  .cat-necessity { background: rgba(255,107,53,0.15); color: var(--accent2); border: 1px solid rgba(255,107,53,0.3); }
  .cat-luxury    { background: rgba(123,97,255,0.15); color: var(--accent3); border: 1px solid rgba(123,97,255,0.3); }
  .cat-other     { background: rgba(107,107,136,0.15); color: var(--muted); border: 1px solid var(--border-bright); }

  .priority-pill {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 26px; height: 26px;
    border-radius: 50%;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    font-weight: 500;
  }

  .remove-btn {
    background: none; border: none; color: var(--muted); cursor: pointer; font-size: 16px; padding: 4px;
  }

  .results-area { display: none; }
  .results-area.visible { display: block; }

  .stats-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 20px;
  }

  .stat-card {
    background: var(--card-bg);
    border: 1px solid var(--border-bright);
    border-radius: 6px;
    padding: 16px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  .stat-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; }
  .stat-card.green::before { background: var(--accent); }
  .stat-card.orange::before { background: var(--accent2); }
  .stat-card.purple::before { background: var(--accent3); }

  .stat-label {
    font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 6px;
  }

  .stat-value { font-family: 'Bebas Neue', sans-serif; font-size: 32px; letter-spacing: 1px; line-height: 1; }
  .stat-card.green .stat-value { color: var(--accent); }
  .stat-card.orange .stat-value { color: var(--accent2); }
  .stat-card.purple .stat-value { color: var(--accent3); }

  .dual-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  @media (max-width: 600px) { .dual-grid { grid-template-columns: 1fr; } }

  .result-item {
    display: flex; align-items: center; gap: 12px; padding: 12px; border-radius: 5px; margin-bottom: 8px; animation: slideIn 0.3s ease forwards; opacity: 0;
  }

  @keyframes slideIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }

  .result-item.selected { background: rgba(0,229,160,0.06); border: 1px solid rgba(0,229,160,0.2); }
  .result-item.excluded { background: rgba(255,255,255,0.02); border: 1px solid var(--border); opacity: 0.6; }

  .result-icon { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
  .selected .result-icon { background: rgba(0,229,160,0.15); }

  .result-name { font-weight: 500; font-size: 13px; flex: 1; }
  .result-meta { text-align: right; font-family: 'DM Mono', monospace; font-size: 11px; }

  .empty-state { text-align: center; padding: 48px 24px; color: var(--muted); }
  .empty-icon { font-size: 40px; margin-bottom: 12px; opacity: 0.4; }

  .welcome-panel {
    background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 48px 40px; text-align: center; position: relative; overflow: hidden;
  }

  .welcome-title {
    font-family: 'Bebas Neue', sans-serif; font-size: 36px; background: linear-gradient(135deg, var(--accent), var(--accent3));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 12px; letter-spacing: 2px;
  }

  .steps-list { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; }
  .step { background: var(--card-bg); border: 1px solid var(--border-bright); border-radius: 6px; padding: 14px 16px; width: 140px; }
  .step-num { font-family: 'Bebas Neue', sans-serif; font-size: 28px; color: var(--accent); line-height: 1; margin-bottom: 6px; }

  .dp-toggle {
    background: none; border: 1px solid var(--border-bright); border-radius: 4px; color: var(--muted); font-family: 'DM Mono', monospace;
    font-size: 11px; padding: 8px 14px; cursor: pointer; width: 100%; margin-top: 12px;
  }

  .dp-table-wrap { display: none; margin-top: 14px; overflow-x: auto; background: var(--card-bg); border: 1px solid var(--border); border-radius: 6px; padding: 16px; }
  .dp-table-wrap.open { display: block; }
  .dp-table { border-collapse: collapse; font-family: 'DM Mono', monospace; font-size: 11px; min-width: 100%; }
  .dp-table th, .dp-table td { border: 1px solid var(--border); padding: 5px 8px; text-align: center; }

  .toast {
    position: fixed; bottom: 24px; right: 24px; background: var(--panel); border: 1px solid var(--border-bright); border-radius: 6px;
    padding: 12px 18px; font-family: 'DM Mono', monospace; font-size: 12px; color: var(--text); z-index: 999; transform: translateY(80px); transition: transform 0.3s ease;
  }
  .toast.show { transform: translateY(0); }
  .toast.error { border-color: var(--danger); color: var(--danger); }
  .toast.success { border-color: var(--accent); color: var(--accent); }

  .toggle-group { display: flex; align-items: center; justify-content: space-between; padding: 10px 12px; background: var(--card-bg); border: 1px solid var(--border-bright); border-radius: 4px; margin-bottom: 10px; }
  .toggle-switch { position: relative; width: 36px; height: 20px; cursor: pointer; }
  .toggle-switch input { display: none; }
  .toggle-track { position: absolute; inset: 0; background: var(--border-bright); border-radius: 10px; transition: background 0.2s; }
  .toggle-switch input:checked ~ .toggle-track { background: var(--accent3); }
  .toggle-thumb { position: absolute; top: 3px; left: 3px; width: 14px; height: 14px; border-radius: 50%; background: white; transition: left 0.2s; }
  .toggle-switch input:checked ~ .toggle-thumb { left: 19px; }
  .weight-field { display: none; }
  .weight-field.visible { display: block; }
  #csvInput { display: none; }
</style>
</head>
<body>

<div class="container">
  <header>
    <div>
      <div class="header-tag">v1.0 · Knapsack Engine</div>
      <div class="header-logo">Smart<br>Cart</div>
    </div>
    <div>
      <div class="header-sub"></div>
      <div class="header-sub"></div>
    </div>
  </header>

  <div class="main-grid">
    <div>
      <div class="panel" style="margin-bottom:16px">
        <div class="panel-header">
          <div class="dot" style="background:var(--accent)"></div>
          <span class="panel-title">Budget Configuration</span>
        </div>
        <div class="panel-body">
          <div class="budget-display">
            <div class="budget-label">Total Budget</div>
            <div class="budget-value" id="budgetDisplay">₹100</div>
            <div class="budget-slider-wrap">
              <span class="slider-label">₹10</span>
              <input type="range" id="budgetSlider" min="10" max="5000" step="10" value="100" oninput="updateBudget(this.value)">
              <span class="slider-label">₹5K</span>
            </div>
          </div>

          <div class="toggle-group">
            <span class="toggle-label" style="font-family:DM Mono; font-size:10px; color:var(--muted)">Necessity Guarantee</span>
            <label class="toggle-switch">
              <input type="checkbox" id="necessityToggle">
              <div class="toggle-track"></div>
              <div class="toggle-thumb"></div>
            </label>
          </div>

          <div class="toggle-group">
            <span class="toggle-label" style="font-family:DM Mono; font-size:10px; color:var(--muted)">Weight Limit</span>
            <label class="toggle-switch">
              <input type="checkbox" id="weightToggle" onchange="toggleWeightField()">
              <div class="toggle-track"></div>
              <div class="toggle-thumb"></div>
            </label>
          </div>

          <div class="weight-field" id="weightFieldWrap">
            <div class="field-group">
              <label>Max Weight (kg)</label>
              <input type="number" id="maxWeightInput" value="10" min="1" step="0.5">
            </div>
          </div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-header">
          <div class="dot" style="background:var(--accent2)"></div>
          <span class="panel-title">Wishlist Builder</span>
        </div>
        <div class="panel-body">
          <div class="form-row">
            <div class="field-group">
              <label>Item Name</label>
              <input type="text" id="itemName" placeholder="e.g. Mouse" />
            </div>
            <div class="field-group">
              <label>Price (₹)</label>
              <input type="number" id="itemPrice" placeholder="500" min="1" />
            </div>
            <div class="field-group" id="weightInputGroup" style="display:none">
              <label>Weight (kg)</label>
              <input type="number" id="itemWeight" placeholder="0.5" min="0.1" step="0.1" />
            </div>
          </div>

          <div class="field-group" style="margin-bottom:10px">
            <label>Category</label>
            <select id="itemCategory">
              <option value="other">⚪ General</option>
              <option value="necessity">🟠 Necessity</option>
              <option value="luxury">🟣 Luxury</option>
            </select>
          </div>

          <div class="field-group">
            <label>Priority Score (1 – 10)</label>
            <div class="priority-wrap" id="priorityPicker"></div>
          </div>

          <button class="btn btn-add" onclick="addItem()">＋ Add to Wishlist</button>
          <label class="btn btn-csv" style="cursor:pointer" for="csvInput">⬆ Import CSV</label>
          <input type="file" id="csvInput" accept=".csv" onchange="handleCSV(event)">

          <div id="wishlistWrap" style="margin-top:16px; display:none">
            <table class="wishlist-table" id="wishlistTable">
              <thead>
                <tr><th>Item</th><th>Price</th><th>Pri.</th><th></th></tr>
              </thead>
              <tbody id="wishlistBody"></tbody>
            </table>
          </div>

          <button class="btn btn-solve" onclick="solve()">⚡ Optimize Cart</button>
        </div>
      </div>
    </div>

    <div id="rightPanel">
      <div class="welcome-panel" id="welcomePanel">
        <div class="welcome-title">Budget Optimizer</div>
        <div class="steps-list">
          <div class="step"><div class="step-num">01</div><div>Set Budget</div></div>
          <div class="step"><div class="step-num">02</div><div>Add Items</div></div>
          <div class="step"><div class="step-num">03</div><div>Optimize</div></div>
        </div>
      </div>

      <div class="results-area" id="resultsArea">
        <div class="stats-row">
          <div class="stat-card green">
            <div class="stat-label">Utility Score</div>
            <div class="stat-value" id="statScore">0</div>
          </div>
          <div class="stat-card orange">
            <div class="stat-label">Total Spent</div>
            <div class="stat-value" id="statSpent">₹0</div>
          </div>
          <div class="stat-card purple">
            <div class="stat-label">Leftover</div>
            <div class="stat-value" id="statLeftover">₹0</div>
          </div>
        </div>

        <div class="dual-grid">
          <div class="panel">
            <div class="panel-header"><div class="dot" style="background:var(--accent)"></div><span class="panel-title">Smart Cart</span></div>
            <div class="panel-body" id="cartBody"></div>
          </div>
          <div class="panel">
            <div class="panel-header"><div class="dot" style="background:var(--muted)"></div><span class="panel-title">Excluded</span></div>
            <div class="panel-body" id="excludedBody"></div>
          </div>
        </div>

        <div class="dp-section">
          <button class="dp-toggle" onclick="toggleDP()">▸ Show DP Matrix</button>
          <div class="dp-table-wrap" id="dpTableWrap"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let items = [];
let selectedPriority = 5;
let dpOpen = false;

(function init() {
  buildPriorityPicker();
  const demos = [
    { name: "Wireless Mouse", price: 1200, priority: 8, category: "other", weight: 0.2, emoji: "🖱" },
    { name: "Programming Book", price: 800, priority: 9, category: "necessity", weight: 0.8, emoji: "📘" },
    { name: "Headphones", price: 2500, priority: 7, category: "luxury", weight: 0.3, emoji: "🎧" }
  ];
  demos.forEach(d => items.push(d));
  renderWishlist();
})();

function buildPriorityPicker() {
  const wrap = document.getElementById('priorityPicker');
  wrap.innerHTML = '';
  for (let i = 1; i <= 10; i++) {
    const btn = document.createElement('button');
    btn.className = 'priority-btn' + (i === selectedPriority ? ' active' : '');
    btn.textContent = i;
    btn.onclick = () => {
      selectedPriority = i;
      wrap.querySelectorAll('.priority-btn').forEach((b, idx) => b.classList.toggle('active', idx + 1 === i));
    };
    wrap.appendChild(btn);
  }
}

function updateBudget(val) {
  document.getElementById('budgetDisplay').textContent = '₹' + val;
}

function toggleWeightField() {
  const on = document.getElementById('weightToggle').checked;
  document.getElementById('weightFieldWrap').classList.toggle('visible', on);
  document.getElementById('weightInputGroup').style.display = on ? 'block' : 'none';
}

function addItem() {
  const name = document.getElementById('itemName').value.trim();
  const price = parseFloat(document.getElementById('itemPrice').value);
  const category = document.getElementById('itemCategory').value;
  const weightOn = document.getElementById('weightToggle').checked;
  const weight = weightOn ? parseFloat(document.getElementById('itemWeight').value) : 1;

  if (!name || !price || price <= 0) return toast('Valid Name and Price required', 'error');

  const emojis = { necessity: '🟠', luxury: '🟣', other: '⚪' };
  items.push({ name, price, priority: selectedPriority, category, weight, emoji: emojis[category] });
  renderWishlist();
  document.getElementById('itemName').value = '';
  document.getElementById('itemPrice').value = '';
  toast('Item Added', 'success');
}

function removeItem(idx) {
  items.splice(idx, 1);
  renderWishlist();
}

function renderWishlist() {
  const wrap = document.getElementById('wishlistWrap');
  const body = document.getElementById('wishlistBody');
  if (!items.length) { wrap.style.display = 'none'; return; }
  wrap.style.display = '';
  body.innerHTML = items.map((item, i) => `
    <tr>
      <td>${item.name} <span class="cat-badge cat-${item.category}">${item.category}</span></td>
      <td style="font-family:DM Mono">₹${item.price}</td>
      <td><div class="priority-pill">${item.priority}</div></td>
      <td><button class="remove-btn" onclick="removeItem(${i})">×</button></td>
    </tr>`).join('');
}

function knapsack01(items, W) {
  const n = items.length;
  const dp = Array.from({length: n+1}, () => new Array(W+1).fill(0));
  for (let i = 1; i <= n; i++) {
    const cost = Math.round(items[i-1].price);
    const val = items[i-1].priority;
    for (let w = 0; w <= W; w++) {
      dp[i][w] = dp[i-1][w];
      if (cost <= w) dp[i][w] = Math.max(dp[i][w], dp[i-1][w-cost] + val);
    }
  }
  let w = W;
  const selected = new Array(n).fill(false);
  for (let i = n; i >= 1; i--) {
    if (dp[i][w] !== dp[i-1][w]) {
      selected[i-1] = true;
      w -= Math.round(items[i-1].price);
    }
  }
  return { dp, selected, maxVal: dp[n][W] };
}

function solve() {
  if (!items.length) return toast('Add items first', 'error');
  const budget = parseInt(document.getElementById('budgetSlider').value);
  const result = knapsack01(items, budget);
  
  const totalCost = items.reduce((s, it, i) => result.selected[i] ? s + it.price : s, 0);
  document.getElementById('welcomePanel').style.display = 'none';
  document.getElementById('resultsArea').classList.add('visible');
  document.getElementById('statScore').textContent = result.maxVal;
  document.getElementById('statSpent').textContent = '₹' + totalCost;
  document.getElementById('statLeftover').textContent = '₹' + (budget - totalCost);

  document.getElementById('cartBody').innerHTML = items.filter((_, i) => result.selected[i]).map(it => renderResultItem(it, true)).join('');
  document.getElementById('excludedBody').innerHTML = items.filter((_, i) => !result.selected[i]).map(it => renderResultItem(it, false)).join('');
  
  renderDPTable(result.dp, items, budget);
  toast('Optimization complete', 'success');
}

function renderResultItem(item, isSelected) {
  return `
  <div class="result-item ${isSelected ? 'selected' : 'excluded'}" style="opacity:1">
    <div class="result-icon">${item.emoji}</div>
    <div class="result-name">${item.name}<br><span class="cat-badge cat-${item.category}">${item.category}</span></div>
    <div class="result-meta"><div>₹${item.price}</div><div>⭐ ${item.priority}</div></div>
  </div>`;
}

function renderDPTable(dp, items, budget) {
  const step = Math.max(1, Math.floor(budget / 10));
  let html = '<table class="dp-table"><thead><tr><th>Item</th>';
  for(let w=0; w<=budget; w+=step) html += `<th>₹${w}</th>`;
  html += '</tr></thead><tbody>';
  for (let i = 0; i <= items.length; i++) {
    html += `<tr><td>${i===0 ? 'Start' : items[i-1].name.slice(0,5)}</td>`;
    for(let w=0; w<=budget; w+=step) html += `<td>${dp[i][w]}</td>`;
    html += '</tr>';
  }
  document.getElementById('dpTableWrap').innerHTML = html + '</tbody></table>';
}

function toggleDP() {
  dpOpen = !dpOpen;
  document.getElementById('dpTableWrap').classList.toggle('open', dpOpen);
}

function toast(msg, type) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast ' + type + ' show';
  setTimeout(() => el.classList.remove('show'), 3000);
}

function handleCSV(e) {
  const file = e.target.files[0];
  const reader = new FileReader();
  reader.onload = (ev) => {
    const lines = ev.target.result.split('\n').slice(1);
    lines.forEach(line => {
      const p = line.split(',');
      if (p.length >= 3) items.push({ name: p[0], price: parseFloat(p[1]), priority: parseInt(p[2]), category: p[3]||'other', emoji: '📦' });
    });
    renderWishlist();
  };
  reader.readAsText(file);
}
